name: Claude Worker

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: 'JSON array of ordered tasks, each with issue_number and prompt'
        required: true
        type: string

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      id-token: write
      workflows: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"

      - name: Create ralph branch from develop
        run: |
          git checkout -b ralph
          git push -u origin ralph

      - name: Process tasks sequentially
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASKS_JSON: ${{ inputs.tasks }}
        run: |
          chmod +x scripts/worker-run.sh
          ./scripts/worker-run.sh

      - name: Post testing summary
        if: always()
        run: |
          if [ -f /tmp/ralph_summary.txt ]; then
            echo "## Ralph Testing Guide" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ralph_summary.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Merge ralph into develop
        run: |
          git checkout develop
          git merge ralph --no-edit
          git push origin develop

      - name: Delete ralph branch
        run: |
          git push origin --delete ralph 2>/dev/null || true
          git branch -d ralph 2>/dev/null || true

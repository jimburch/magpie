name: Ralph Task
description: A task for Ralph (autonomous AI agent) to pick up
labels: ['ralph']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why.
      placeholder: Describe the task clearly so an autonomous agent can implement it.
    validations:
      required: true

  - type: dropdown
    id: classification
    attributes:
      label: Classification
      description: Can this be done autonomously or does it need human input?
      options:
        - AFK
        - HITL
      default: 0
    validations:
      required: true

  - type: textarea
    id: blocked-by
    attributes:
      label: Blocked by
      description: List any issue numbers this depends on (one per line).
      placeholder: |
        #38
        #39
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What does "done" look like?
      placeholder: |
        - [ ] Feature works as described
        - [ ] Tests pass
        - [ ] No lint errors
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra context, code references, or design notes.
    validations:
      required: false
